<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>色彩數字配對 - 職能治療師 鄭凱文</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        .preview-container {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: top center;
        }

        #printable-area { 
            box-sizing: border-box;
            break-after: avoid; 
            page-break-after: avoid;
        }

        @media print {
            @page { size: A4; margin: 0; }
            body { background: white; margin: 0; }
            .print-hidden { display: none !important; }
            #printable-area { 
                transform: none !important; 
                width: 210mm !important; 
                height: 296.5mm !important; 
                margin: 0 !important; 
                overflow: hidden !important;
            }
        }

        .mobile-drawer {
            transition: transform 0.3s ease-in-out;
        }
        .drawer-open { transform: translateY(0); }
        .drawer-closed { transform: translateY(100%); }
    </style>
</head>
<body class="bg-slate-900 overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                settings: <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2zM12 15a3 3 0 1 1 0-6 3 3 0 0 1 0 6z"/>,
                download: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>,
                refresh: <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>,
                chevronLeft: <path d="m15 18-6-6 6-6"/>,
                chevronRight: <path d="m9 18 6-6-6-6"/>,
                external: <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14 21 3"/>,
                close: <path d="M18 6 6 18M6 6l12 12"/>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const App = () => {
            const [numCount, setNumCount] = useState(9);
            const [itemsPerBlock, setItemsPerBlock] = useState(9);
            const title = "色彩數字配對";
            const subTitle = "根據方框的顏色，填上對應的數字";
            const [sidebarOpen, setSidebarOpen] = useState(window.innerWidth > 768);
            const [previewScale, setPreviewScale] = useState(0.65);
            const [allowDuplicate, setAllowDuplicate] = useState(false);
            const [isGenerating, setIsGenerating] = useState(false);
            const [isMobile, setIsMobile] = useState(window.innerWidth <= 768);
            
            const [mapping, setMapping] = useState([]);
            const [questionBlocks, setQuestionBlocks] = useState([]);
            const printRef = useRef(null);
            const lastValidSettings = useRef({ itemsPerBlock, numCount });

            const blockCount = 6;
            const fontSize = 32;

            const colorPalette = [
                { name: '天藍', border: '#3498db' }, { name: '金黃', border: '#f1c40f' },
                { name: '珊瑚紅', border: '#e74c3c' }, { name: '粉紫', border: '#9b59b6' },
                { name: '粉紅', border: '#fd79a8' }, { name: '深綠', border: '#27ae60' },
                { name: '橙色', border: '#e67e22' }, { name: '灰色', border: '#7f8c8d' },
                { name: '嫩綠', border: '#badc58' }, { name: '深藍', border: '#2c3e50' }
            ];

            useEffect(() => {
                const handleResize = () => {
                    const mobile = window.innerWidth <= 768;
                    setIsMobile(mobile);
                    if (mobile) {
                        const padding = 32;
                        const availableWidth = window.innerWidth - padding;
                        const a4WidthPx = 210 * 3.78; 
                        const autoScale = Math.min(0.42, availableWidth / a4WidthPx);
                        setPreviewScale(autoScale);
                    } else {
                        setPreviewScale(0.65);
                    }
                };
                window.addEventListener('resize', handleResize);
                handleResize();
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            const shuffle = (array) => {
                const newArr = [...array];
                for (let i = newArr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
                }
                return newArr;
            };

            useEffect(() => { setItemsPerBlock(numCount); }, [numCount]);

            const initGenerator = () => {
                const newMapping = [];
                for (let i = 1; i <= numCount; i++) {
                    newMapping.push({ num: i, ...colorPalette[(i - 1) % colorPalette.length] });
                }
                setMapping(newMapping);

                const newBlocks = [];
                for (let b = 0; b < blockCount; b++) {
                    const blockItems = [];
                    if (allowDuplicate) {
                        for (let i = 0; i < itemsPerBlock; i++) {
                            blockItems.push(newMapping[Math.floor(Math.random() * newMapping.length)]);
                        }
                    } else {
                        let pool = [];
                        while (pool.length < itemsPerBlock) { pool = [...pool, ...shuffle(newMapping)]; }
                        blockItems.push(...pool.slice(0, itemsPerBlock));
                    }
                    newBlocks.push(blockItems);
                }
                setQuestionBlocks(newBlocks);
            };

            useEffect(() => { initGenerator(); }, [numCount, itemsPerBlock, allowDuplicate]);

            useEffect(() => {
                const checkOverflow = () => {
                    if (printRef.current) {
                        const maxHeight = 1115; 
                        const currentHeight = printRef.current.scrollHeight;
                        if (currentHeight > maxHeight) {
                            if (itemsPerBlock > lastValidSettings.current.itemsPerBlock) setItemsPerBlock(lastValidSettings.current.itemsPerBlock);
                            else if (numCount > lastValidSettings.current.numCount) setNumCount(lastValidSettings.current.numCount);
                        } else {
                            lastValidSettings.current = { itemsPerBlock, numCount };
                        }
                    }
                };
                const timer = setTimeout(checkOverflow, 50);
                return () => clearTimeout(timer);
            }, [questionBlocks, itemsPerBlock]);

            const handleDownloadPDF = async () => {
                setIsGenerating(true);
                try {
                    const element = printRef.current;
                    const opt = {
                        margin: 0,
                        filename: `${title}_訓練單.pdf`,
                        image: { type: 'jpeg', quality: 1 },
                        html2canvas: { scale: 3, useCORS: true, logging: false },
                        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
                        pagebreak: { mode: ['avoid-all', 'css'] }
                    };
                    await html2pdf().set(opt).from(element).save();
                } catch (error) {
                    console.error("PDF下載失敗:", error);
                } finally {
                    setIsGenerating(false);
                }
            };

            const TrainingBox = ({ item, showNumber = false }) => (
                <div className="aspect-[2/1] rounded-2xl border-[3.5px] flex items-center justify-center bg-white shadow-sm"
                     style={{ borderColor: item.border, width: '100%', maxWidth: '115px', minWidth: '75px' }}>
                    {showNumber && <span className="font-bold text-slate-800" style={{ fontSize: `${fontSize}px` }}>{item.num}</span>}
                </div>
            );

            const SettingsContent = () => (
                <div className="p-6 space-y-6">
                    <div className="flex items-center justify-between mb-2">
                        <div className="flex items-center gap-2 text-indigo-600">
                            <Icon name="settings" size={24} />
                            <h1 className="text-xl font-bold">參數設定</h1>
                        </div>
                        {isMobile && (
                            <button onClick={() => setSidebarOpen(false)} className="p-2 bg-slate-100 rounded-full text-slate-500">
                                <Icon name="close" />
                            </button>
                        )}
                    </div>
                    
                    <div className="space-y-5">
                        <div className="grid grid-cols-1 gap-5">
                            <section>
                                <div className="flex justify-between items-center mb-1.5 text-xs font-bold text-slate-400 uppercase tracking-wider">
                                    <span>對照數字數量 ({numCount})</span>
                                </div>
                                <input type="range" min="1" max="9" value={numCount} onChange={(e) => setNumCount(parseInt(e.target.value))} className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600"/>
                            </section>
                            
                            <section>
                                <div className="flex justify-between items-center mb-1.5 text-xs font-bold text-slate-400 uppercase tracking-wider">
                                    <span>每題數量 ({itemsPerBlock})</span>
                                </div>
                                <input type="range" min="1" max="9" value={itemsPerBlock} onChange={(e) => setItemsPerBlock(parseInt(e.target.value))} className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600"/>
                            </section>
                        </div>

                        <section>
                            <label className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5 block">重複模式</label>
                            <div className="flex bg-slate-100 p-1 rounded-xl">
                                <button onClick={() => setAllowDuplicate(false)} className={`flex-1 py-1.5 rounded-lg text-xs font-bold transition-all ${!allowDuplicate ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500'}`}>不重複</button>
                                <button onClick={() => setAllowDuplicate(true)} className={`flex-1 py-1.5 rounded-lg text-xs font-bold transition-all ${allowDuplicate ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500'}`}>隨機重複</button>
                            </div>
                        </section>

                        <section>
                            <div className="flex justify-between items-center mb-1.5 text-xs font-bold text-slate-400 uppercase tracking-wider">
                                <span>預覽縮放</span>
                                <span>{Math.round(previewScale * 100)}%</span>
                            </div>
                            <input type="range" min="0.2" max="1.0" step="0.05" value={previewScale} onChange={(e) => setPreviewScale(parseFloat(e.target.value))} className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-slate-400"/>
                        </section>

                        <div className="pt-2 space-y-3">
                            <button onClick={initGenerator} className="w-full flex items-center justify-center gap-2 bg-slate-800 hover:bg-black text-white py-3.5 rounded-2xl transition-all shadow-md active:scale-95 font-bold">
                                <Icon name="refresh" size={18} /> 重新生成
                            </button>
                            <button onClick={handleDownloadPDF} disabled={isGenerating} className={`w-full flex items-center justify-center gap-2 py-4 rounded-2xl transition-all shadow-lg font-bold text-white bg-indigo-600 hover:bg-indigo-700 active:scale-95 ${isGenerating && 'opacity-70'}`}>
                                {isGenerating ? <div className="animate-spin h-5 w-5 border-2 border-white border-t-transparent rounded-full"/> : <Icon name="download" size={20} />}
                                {isGenerating ? '產出中...' : '下載 PDF 訓練單'}
                            </button>
                        </div>
                    </div>
                    
                    <div className="pt-4 border-t border-slate-100 text-[10px] text-slate-400 font-medium text-center">
                        設計：<a href="https://www.facebook.com/mpotkevin" target="_blank" rel="noopener noreferrer" className="text-indigo-500 hover:underline inline-flex items-center gap-1">職能治療師 鄭凱文 <Icon name="external" size={10}/></a>
                    </div>
                </div>
            );

            return (
                <div className="h-screen w-full bg-slate-900 flex flex-col md:flex-row font-sans overflow-hidden">
                    
                    {!isMobile ? (
                        <div className={`bg-white h-full transition-all duration-300 shadow-2xl z-50 relative ${sidebarOpen ? 'w-[320px]' : 'w-0'}`}>
                            <div className={`w-[320px] h-full overflow-y-auto overflow-x-hidden ${!sidebarOpen && 'invisible'}`}>
                                <SettingsContent />
                            </div>
                            <button onClick={() => setSidebarOpen(!sidebarOpen)} className="absolute -right-8 top-1/2 -translate-y-1/2 w-8 h-20 bg-white border border-l-0 border-slate-200 rounded-r-2xl shadow-xl flex items-center justify-center hover:bg-indigo-50 transition-all">
                                <Icon name={sidebarOpen ? "chevronLeft" : "chevronRight"} className="text-indigo-600" />
                            </button>
                        </div>
                    ) : (
                        <div className={`fixed inset-0 z-50 transition-opacity duration-300 ${sidebarOpen ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}>
                            <div className="absolute inset-0 bg-black/60 backdrop-blur-sm" onClick={() => setSidebarOpen(false)}></div>
                            <div className={`absolute bottom-0 left-0 right-0 bg-white rounded-t-[32px] mobile-drawer max-h-[90vh] overflow-y-auto ${sidebarOpen ? 'drawer-open' : 'drawer-closed'}`}>
                                <SettingsContent />
                            </div>
                        </div>
                    )}

                    <div className="flex-1 relative overflow-auto bg-slate-800 scrollbar-hide flex items-start justify-center p-4 md:p-12">
                        <div className="preview-container" style={{ transform: `scale(${previewScale})` }}>
                            <div ref={printRef} id="printable-area" className="bg-white shadow-[0_0_50px_rgba(0,0,0,0.5)] w-[210mm] h-[296.5mm] p-[8mm] flex flex-col overflow-hidden select-none" style={{ boxSizing: 'border-box' }}>
                                
                                <div className="text-center mb-4">
                                    <h2 className="text-4xl font-black text-slate-800 tracking-[0.15em] mb-2">{title}</h2>
                                    <p className="text-slate-500 text-sm font-medium">{subTitle}</p>
                                </div>

                                <div className="grid grid-cols-3 gap-4 py-3 border-y-2 border-slate-100 bg-slate-50/50 rounded-2xl mb-5 px-6 text-slate-700 text-base font-bold">
                                    <div className="flex items-end gap-1 whitespace-nowrap">姓名：<span className="flex-1 border-b-2 border-slate-300 min-w-[60px]"></span></div>
                                    <div className="flex items-end gap-1 whitespace-nowrap">日期：<span className="flex-1 border-b-2 border-slate-300 min-w-[60px]"></span></div>
                                    <div className="flex items-end gap-1 whitespace-nowrap">時間：<span className="flex-1 border-b-2 border-slate-300 min-w-[60px]"></span></div>
                                </div>

                                <div className="mb-5 p-4 bg-white rounded-[32px] border-2 border-indigo-100 shadow-sm">
                                    <div className="grid grid-cols-5 gap-3 justify-items-center">
                                        {mapping.map((item, idx) => <TrainingBox key={idx} item={item} showNumber={true} />)}
                                    </div>
                                </div>

                                <div className="flex items-center gap-4 mb-5">
                                    <div className="flex-1 h-[1.5px] bg-indigo-50"></div>
                                    <span className="text-[10px] tracking-[0.3em] font-black text-indigo-200 uppercase">QUESTIONS AREA</span>
                                    <div className="flex-1 h-[1.5px] bg-indigo-50"></div>
                                </div>

                                <div className="grid grid-cols-2 gap-x-8 gap-y-6 flex-1 items-start px-2">
                                    {questionBlocks.map((block, bIdx) => (
                                        <div key={bIdx} className="relative pt-6 pb-2.5 px-3 border border-slate-100 rounded-[24px] bg-slate-50/10">
                                            <div className="absolute -top-3 left-4 bg-indigo-600 text-white text-[10px] px-4 py-1 rounded-full font-black shadow-md">題目 #{bIdx + 1}</div>
                                            <div className="grid gap-2 justify-items-center" style={{ gridTemplateColumns: `repeat(3, minmax(0, 1fr))` }}>
                                                {block.map((item, iIdx) => <TrainingBox key={iIdx} item={item} showNumber={false} />)}
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <div className="mt-auto h-4"></div>
                            </div>
                        </div>

                        {isMobile && (
                            <div className="fixed bottom-6 right-6 flex flex-col gap-3 z-40">
                                <button onClick={initGenerator} className="w-14 h-14 bg-slate-800 text-white rounded-full shadow-2xl flex items-center justify-center active:scale-90 transition-transform">
                                    <Icon name="refresh" />
                                </button>
                                <button onClick={() => setSidebarOpen(true)} className="w-14 h-14 bg-indigo-600 text-white rounded-full shadow-2xl flex items-center justify-center active:scale-90 transition-transform">
                                    <Icon name="settings" />
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
