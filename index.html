<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專注力訓練產生器 - 鄭凱文職能治療師</title>
    <!-- 載入 React 與相關套件 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        @media print {
            @page { size: A4; margin: 0; }
            body { background: white; margin: 0; }
            .print-hidden { display: none !important; }
            #printable-area { transform: none !important; width: 210mm !important; height: 296.2mm !important; margin: 0 !important; }
        }
    </style>
</head>
<body class="bg-slate-100 overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 圖示組件
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                settings: <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2zM12 15a3 3 0 1 1 0-6 3 3 0 0 1 0 6z"/>,
                download: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>,
                refresh: <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>,
                chevronLeft: <path d="m15 18-6-6 6-6"/>,
                chevronRight: <path d="m9 18 6-6-6-6"/>,
                external: <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14 21 3"/>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const App = () => {
            const [numCount, setNumCount] = useState(9);
            const [itemsPerBlock, setItemsPerBlock] = useState(9);
            const [title, setTitle] = useState("專注力訓練");
            const [subTitle, setSubTitle] = useState("根據方框的顏色，填上對應的數字");
            const [sidebarOpen, setSidebarOpen] = useState(true);
            const [previewScale, setPreviewScale] = useState(0.65);
            const [allowDuplicate, setAllowDuplicate] = useState(false);
            const [isGenerating, setIsGenerating] = useState(false);
            
            const [mapping, setMapping] = useState([]);
            const [questionBlocks, setQuestionBlocks] = useState([]);
            const printRef = useRef(null);
            const lastValidSettings = useRef({ itemsPerBlock, numCount });

            const blockCount = 6;
            const fontSize = 24;

            const colorPalette = [
                { name: '天藍', border: '#3498db' }, { name: '金黃', border: '#f1c40f' },
                { name: '珊瑚紅', border: '#e74c3c' }, { name: '粉紫', border: '#9b59b6' },
                { name: '粉紅', border: '#fd79a8' }, { name: '深綠', border: '#27ae60' },
                { name: '橙色', border: '#e67e22' }, { name: '灰色', border: '#7f8c8d' },
                { name: '嫩綠', border: '#badc58' }, { name: '深藍', border: '#2c3e50' }
            ];

            const shuffle = (array) => {
                const newArr = [...array];
                for (let i = newArr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
                }
                return newArr;
            };

            useEffect(() => { setItemsPerBlock(numCount); }, [numCount]);

            const initGenerator = () => {
                const newMapping = [];
                for (let i = 1; i <= numCount; i++) {
                    newMapping.push({ num: i, ...colorPalette[(i - 1) % colorPalette.length] });
                }
                setMapping(newMapping);

                const newBlocks = [];
                for (let b = 0; b < blockCount; b++) {
                    const blockItems = [];
                    if (allowDuplicate) {
                        for (let i = 0; i < itemsPerBlock; i++) {
                            blockItems.push(newMapping[Math.floor(Math.random() * newMapping.length)]);
                        }
                    } else {
                        let pool = [];
                        while (pool.length < itemsPerBlock) { pool = [...pool, ...shuffle(newMapping)]; }
                        blockItems.push(...pool.slice(0, itemsPerBlock));
                    }
                    newBlocks.push(blockItems);
                }
                setQuestionBlocks(newBlocks);
            };

            useEffect(() => { initGenerator(); }, [numCount, itemsPerBlock, allowDuplicate]);

            useEffect(() => {
                const checkOverflow = () => {
                    if (printRef.current) {
                        const maxHeight = 1118;
                        const currentHeight = printRef.current.scrollHeight;
                        if (currentHeight > maxHeight) {
                            if (itemsPerBlock > lastValidSettings.current.itemsPerBlock) setItemsPerBlock(lastValidSettings.current.itemsPerBlock);
                            else if (numCount > lastValidSettings.current.numCount) setNumCount(lastValidSettings.current.numCount);
                        } else {
                            lastValidSettings.current = { itemsPerBlock, numCount };
                        }
                    }
                };
                const timer = setTimeout(checkOverflow, 50);
                return () => clearTimeout(timer);
            }, [questionBlocks, title, itemsPerBlock]);

            const handleDownloadPDF = async () => {
                setIsGenerating(true);
                try {
                    const element = printRef.current;
                    const opt = {
                        margin: 0,
                        filename: `${title}_訓練單.pdf`,
                        image: { type: 'jpeg', quality: 1 },
                        html2canvas: { scale: 3, useCORS: true },
                        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
                        pagebreak: { mode: ['avoid-all'] }
                    };
                    await html2pdf().set(opt).from(element).save();
                } catch (error) {
                    console.error("PDF下載失敗:", error);
                } finally {
                    setIsGenerating(false);
                }
            };

            const TrainingBox = ({ item, showNumber = false }) => (
                <div className="aspect-[2/1] rounded-2xl border-[3.5px] flex items-center justify-center bg-white shadow-sm"
                     style={{ borderColor: item.border, width: '100%', maxWidth: '100px', minWidth: '75px' }}>
                    {showNumber && <span className="font-bold text-slate-800" style={{ fontSize: `${fontSize}px` }}>{item.num}</span>}
                </div>
            );

            return (
                <div className="h-screen bg-slate-100 flex flex-col md:flex-row font-sans overflow-hidden">
                    {/* 設定側邊欄 */}
                    <div className={`bg-white border-r border-slate-200 transition-all duration-300 flex flex-col shadow-2xl z-30 relative ${sidebarOpen ? 'w-full md:w-80' : 'w-0 overflow-hidden'}`}
                         style={{ width: sidebarOpen ? '340px' : '0px' }}>
                        <div className="p-6 flex-1 overflow-y-auto min-w-[340px]">
                            <div className="flex items-center gap-2 text-indigo-600 mb-8">
                                <Icon name="settings" size={24} />
                                <h1 className="text-xl font-bold">參數設定區</h1>
                            </div>
                            <div className="space-y-6">
                                <section>
                                    <label className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 block">標題文字</label>
                                    <input type="text" value={title} onChange={(e) => setTitle(e.target.value)} className="w-full p-2.5 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500"/>
                                </section>
                                <section>
                                    <div className="flex justify-between items-center mb-2 text-xs font-bold text-slate-400 uppercase tracking-wider">
                                        <span>對照數字數量 (1-9)</span>
                                        <span className="text-indigo-600 font-bold">{numCount}</span>
                                    </div>
                                    <input type="range" min="1" max="9" value={numCount} onChange={(e) => setNumCount(parseInt(e.target.value))} className="w-full h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600"/>
                                </section>
                                <section>
                                    <div className="flex justify-between items-center mb-2 text-xs font-bold text-slate-400 uppercase tracking-wider">
                                        <span>每題作答數量 (至多 9 個)</span>
                                        <span className="text-indigo-600 font-bold">{itemsPerBlock}</span>
                                    </div>
                                    <input type="range" min="1" max="9" value={itemsPerBlock} onChange={(e) => setItemsPerBlock(parseInt(e.target.value))} className="w-full h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600"/>
                                </section>
                                <section>
                                    <label className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 block">出題模式(顏色)</label>
                                    <div className="grid grid-cols-2 gap-2">
                                        <button onClick={() => setAllowDuplicate(false)} className={`py-2 rounded-lg border text-xs font-bold ${!allowDuplicate ? 'bg-indigo-600 text-white' : 'bg-slate-50 text-slate-500'}`}>不重複</button>
                                        <button onClick={() => setAllowDuplicate(true)} className={`py-2 rounded-lg border text-xs font-bold ${allowDuplicate ? 'bg-indigo-600 text-white' : 'bg-slate-50 text-slate-500'}`}>隨機重複</button>
                                    </div>
                                </section>
                                <section>
                                    <label className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 block">螢幕預覽縮放</label>
                                    <input type="range" min="0.4" max="0.9" step="0.05" value={previewScale} onChange={(e) => setPreviewScale(parseFloat(e.target.value))} className="w-full h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-slate-400"/>
                                </section>
                                <div className="pt-4 space-y-3">
                                    <button onClick={initGenerator} className="w-full flex items-center justify-center gap-2 bg-slate-800 hover:bg-black text-white py-3.5 rounded-xl transition-all shadow-md active:scale-95 font-bold">
                                        <Icon name="refresh" size={18} /> 重新生成內容
                                    </button>
                                    <button onClick={handleDownloadPDF} disabled={isGenerating} className={`w-full flex items-center justify-center gap-2 py-4 rounded-xl transition-all shadow-lg font-bold text-white bg-indigo-600 hover:bg-indigo-700 active:scale-95 ${isGenerating && 'opacity-70'}`}>
                                        {isGenerating ? <div className="animate-spin h-5 w-5 border-2 border-white border-t-transparent rounded-full"/> : <Icon name="download" size={20} />}
                                        {isGenerating ? '正在產生檔案...' : '點擊自動下載 PDF'}
                                    </button>
                                </div>
                            </div>
                            <div className="mt-8 pt-6 border-t border-slate-100 text-sm text-slate-500 font-medium">
                                設計：<a href="https://www.facebook.com/mpotkevin" target="_blank" rel="noopener noreferrer" className="text-indigo-600 hover:underline font-bold inline-flex items-center gap-1">職能治療師 - 鄭凱文 <Icon name="external" size={12}/></a>
                            </div>
                        </div>
                    </div>

                    {/* 收折按鈕 */}
                    <button onClick={() => setSidebarOpen(!sidebarOpen)} className="fixed left-0 top-1/2 -translate-y-1/2 w-8 h-16 bg-white border border-slate-200 rounded-r-2xl shadow-xl flex items-center justify-center hover:bg-indigo-50 transition-all z-40">
                        <Icon name={sidebarOpen ? "chevronLeft" : "chevronRight"} className="text-indigo-600" />
                    </button>

                    {/* 預覽區 */}
                    <div className="flex-1 overflow-auto bg-slate-500/10 flex justify-center p-4 md:p-8 scrollbar-hide">
                        <div className="origin-top transition-transform duration-300" style={{ transform: `scale(${previewScale})` }}>
                            <div ref={printRef} id="printable-area" className="bg-white shadow-2xl w-[210mm] h-[296.2mm] p-[8mm] flex flex-col overflow-hidden" style={{ boxSizing: 'border-box' }}>
                                <div className="text-center mb-4">
                                    <h2 className="text-4xl font-black text-slate-800 tracking-[0.25em] mb-2">{title}</h2>
                                    <p className="text-slate-400 text-sm">{subTitle}</p>
                                </div>
                                <div className="grid grid-cols-3 gap-2 py-4 border-y-2 border-slate-100 bg-slate-50/20 rounded-2xl mb-6 px-6 text-slate-700 text-sm font-bold">
                                    <div>姓名：__________</div>
                                    <div>日期：__________</div>
                                    <div>時間：__________</div>
                                </div>
                                <div className="mb-6 p-4 bg-white rounded-3xl border-2 border-indigo-100 shadow-sm">
                                    <div className="grid grid-cols-5 gap-3 justify-items-center">
                                        {mapping.map((item, idx) => <TrainingBox key={idx} item={item} showNumber={true} />)}
                                    </div>
                                </div>
                                <div className="flex items-center gap-4 mb-6 text-slate-100">
                                    <div className="flex-1 border-t-2"></div>
                                    <span className="text-[9px] tracking-widest font-bold text-slate-300 uppercase font-bold">題目區域</span>
                                    <div className="flex-1 border-t-2"></div>
                                </div>
                                <div className="grid grid-cols-2 gap-x-8 gap-y-6 flex-1 items-start">
                                    {questionBlocks.map((block, bIdx) => (
                                        <div key={bIdx} className="relative pt-6 p-3 border border-slate-100 rounded-3xl bg-slate-50/5">
                                            <div className="absolute -top-3 left-4 bg-indigo-600 text-white text-[9px] px-3 py-1 rounded-full font-black shadow-sm">題目 #{bIdx + 1}</div>
                                            <div className="grid gap-2 justify-items-center" style={{ gridTemplateColumns: `repeat(3, minmax(0, 1fr))` }}>
                                                {block.map((item, iIdx) => <TrainingBox key={iIdx} item={item} showNumber={false} />)}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="mt-auto pt-4 flex justify-center text-slate-400 text-[11px] font-bold border-t border-slate-100">
                                    <a href="https://www.facebook.com/mpotkevin" target="_blank" rel="noopener noreferrer" className="hover:text-indigo-600 transition-colors">職能治療師 - 鄭凱文 設計</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
